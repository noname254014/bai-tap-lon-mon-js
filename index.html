<!DOCTYPE html>
<html lang="vi">
<head>

    <style>
        /* Ghi đè CSS gốc để phù hợp kiến trúc OS */
        #desktop-screen { position: fixed; width: 100%; height: 100%; top: 0; left: 0; display: none; z-index: 1; }
        /* Đảm bảo các cửa sổ OS (z-index 100+) hiển thị đè lên background (z-index 1-13) */
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web OS - Pure JS Project</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; }
        
        /* Cấu trúc phân lớp màn hình */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            z-index: 9999;
        }
        #desktop-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            display: none;
            opacity: 0;
            z-index: 100;
        }
        #desktop-screen.sleep-mode #desktop_id,
        #desktop-screen.sleep-mode #taskbar_id {
            visibility: hidden;
            pointer-events: none;
        }
        #desktop-screen.sleep-mode #bg-layer {
            z-index: 99998 !important;
            pointer-events: auto;
        }

        /* Giao diện Form Đăng nhập doanh nghiệp */
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 40px; border-radius: 12px; width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            opacity: 0; /* Chuẩn bị cho hiệu ứng Fade-in ban đầu */
        }
        .login-container h2 { color: #ffffff; text-align: center; margin-bottom: 24px; font-weight: 500; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group input {
            width: 100%; padding: 12px 16px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px;
            color: #fff; font-size: 14px; outline: none; transition: all 0.3s ease;
        }
        .input-group input:focus { border-color: #00adb5; box-shadow: 0 0 8px rgba(0, 173, 181, 0.4); }
        .btn-panel { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        .btn-panel button {
            width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: all 0.2s ease;
        }
        .btn-primary { background-color: #00adb5; color: white; }
        .btn-primary:hover { background-color: #008c95; }
        .btn-secondary { background-color: transparent; border: 1px solid rgba(255, 255, 255, 0.3) !important; color: #ccc; }
        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.05); color: #fff; }
        .error-msg { color: #ff4a4a; font-size: 12px; margin-top: 8px; text-align: center; display: none; }
    </style>
</head>
<body>

    <section id="login-screen">
        <div class="login-container" id="login-form-box">
            <h2>ENTERPRISE OS</h2>
            <form id="auth-form" onsubmit="return false;">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Tên tài khoản" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Mật khẩu">
                </div>
                <div class="error-msg" id="login-error"></div>
                <div class="btn-panel">
                    <button type="button" class="btn-primary" id="btn-login">Đăng nhập</button>
                    <button type="button" class="btn-secondary" id="btn-register">Đăng ký hệ thống</button>
                    <button type="button" class="btn-secondary" id="btn-guest">Truy cập với tư cách Khách</button>
                </div>
            </form>
        </div>
    </section>

    <section id="desktop-screen"></section>

    <script type="module" src="./src/shell/boot.js"></script>
</body>
</html>
